apiVersion: apps/v1
kind: Deployment
metadata:
  name: native-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: native-app
  template:
    metadata:
      labels:
        app: native-app
    spec:
      containers:
      - name: app
        image: {{ .Values.image.name }}:{{ .Values.image.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
          - name: SPRING_MONGODB_HOST
            valueFrom:
              configMapKeyRef:
                name: mongodb-configmap
                key: database_url
          - name: SPRING_MONGODB_USERNAME
            valueFrom:
              secretKeyRef:
                key: mongo-root-username
                name: mongodb-secret
          - name: SPRING_MONGODB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: mongo-root-password
                name: mongodb-secret
          - name: SPRING_MONGODB_DATABASE
            value: {{ .Values.mongo.database }}
          - name: SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE
            value: {{ .Values.mongo.authDb }}