apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: native-app
spec:
  template:
    spec: #pod spec
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/region
                    operator: In
                    values:
                      - us-east-1
                      - eu-west-1
      containers:
      - name: app
        image: demo:0.0.4-SNAPSHOT
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
          - name: SPRING_MONGODB_HOST
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: database_host
          - name: SPRING_MONGODB_DATABASE
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: database_name
          - name: SPRING_MONGODB_USERNAME
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: username
          - name: SPRING_MONGODB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-secret
                key: password
          - name: SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE
            value: admin