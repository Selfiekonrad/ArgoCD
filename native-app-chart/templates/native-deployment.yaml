apiVersion: apps/v1
kind: Deployment
metadata:
  name: native-app
spec:

  selector:
    matchLabels:
      app: native-app
  template:
    metadata:
      labels:
        app: native-app
    spec:
      containers:
      - name: app
        image: {{ .Values.native.image.name }}:{{ .Values.native.image.tag }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.native.container.containerPort }}
        resources:
          requests:
            cpu: 50m
            memory: 521Mi
          limits:
            cpu: 250m
            memory: 1024Mi

        env:
          - name: SPRING_MONGODB_HOST
            valueFrom:
              configMapKeyRef:
                name: mongodb-configmap
                key: database_url
          - name: SPRING_MONGODB_USERNAME
            valueFrom:
              secretKeyRef:
                key: mongo-root-username
                name: mongodb-secret
          - name: SPRING_MONGODB_PASSWORD
            valueFrom:
              secretKeyRef:
                key: mongo-root-password
                name: mongodb-secret
          - name: SPRING_MONGODB_DATABASE
            value: {{ .Values.mongo.database }}
          - name: SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE
            value: {{ .Values.mongo.authDb }}